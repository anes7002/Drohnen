version: '3.8'
services:
  db:
    image: postgres:15
    container_name: drone_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - drone_data:/var/lib/postgresql/data

volumes:
  drone_data: